<script>
(function(){
  var P=JSON.parse(document.getElementById('payload').textContent);
  var gate=document.getElementById('gate'),pin=document.getElementById('pin'),err=document.getElementById('err');
  function dec(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)});}
  async function tryPin(v){
    try{
      var enc=new TextEncoder();
      var base=await crypto.subtle.importKey('raw',enc.encode(v),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(P.salt),iterations:P.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(P.iv)},key,dec(P.ct));
      var html=new TextDecoder().decode(pt);
      document.open();document.write(html);document.close();
    }catch(e){
      err.style.opacity='1';pin.value='';pin.style.animation='shake .3s ease';
      setTimeout(function(){pin.style.animation=''},300);
    }
  }
  pin.addEventListener('input',function(){
    err.style.opacity='0';
    if(pin.value.length>=5)tryPin(pin.value);
  });
  pin.addEventListener('keydown',function(e){if(e.key==='Enter'&&pin.value)tryPin(pin.value);});
})();
</script>
